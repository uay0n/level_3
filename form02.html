<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>폼태그. 선택, 목록기능</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/form02.css">
    <script src="./scripts/form02.js"></script>
</head>
<body>
    <form action="#" method="post" id="frm1" name="frm1">
        <!-- p>input:search#user_search_txt -->
        <p><input type="search" placeholder="검색어" name="user_search_txt" id="user_search_txt"></p>
        <!-- p>input#number --> <!-- 기초수량 -->
        <p><input type="text" value="1" id="number"></p>
        <!-- p>input:password#user_pw --> <!-- 가려져서 나오는 비밀번호 형식 -->
        <p><input type="password" placeholder="비밀번호를 입력하세요" name="user_pw" id="user_pw"></p>
        <!-- tectarea > 웹페이지에서 사용자가 여러 줄의 긴 텍스트를 입력할 수 있게 만드는 입력필드 -->
        <p><textarea rows="10" cols="50" placeholder="자세한 사항을 입력하세요." name="user_review" id="user_review"></textarea></p>
        <!-- disabled > 비활성화  rows="10" cols="50" > 가로세로-->
        <p><textarea name="close_comment" id="close_comment" cols="50" disabled>현재는 문의시간이 아닙니다.</textarea></p>
        <p><textarea name="user_riview" id="user_riview" placeholder="10자 이상 100자 이하로 입력해주세요." cols="50" rows="5" maxlength="100" minlength="10"></textarea></p>
        <!-- p>button:button#review_btn -->
        <p><button type="button" id="review_btn">리뷰등록</button></p>
        <hr>
        <div class="group1">
            <span>성별을 선택해주세요.</span>
            <!-- for=id 동일하게가기 -->
            <label for="male">남자</label>
            <input type="radio" name="gender" value="male" id="male">
            <label for="female">여자</label>
            <input type="radio" name="gender" value="female" id="female">
            <label for="gender_none">공개안함</label>
            <input type="radio" name="gender" value="gender_none" id="gender_none">
            <!-- input 입력양식/선택양식 -->
            <!-- 입력양식 name(데이터구분목적), value(기본값)속성 -->
            <!-- 선택양식 name(2개이상의선택을묶어주는동일그룹명), value속성(데이터구분목적) -->
            <span>광고 수신 동의</span>
            <label for="consent">동의함</label>
            <input type="radio" name="ad_g" value="consent" id="consent">
            <label for="disagree">동의안함</label>
            <input type="radio" name="ad_g" value="disagree" id="disagree">
            <!-- 하나의 선택지로 가능한 체크박스 -->
            <label for="login_state_y">로그인상태유지</label>
            <input type="checkbox" name="login_state_y_g" value="login_state_y" id="login_state_y">
            <span>관심 종목을 2개 이상 선택하세요.</span>
            <label for="concern_it">기술/IT</label>
            <input type="checkbox" name="concern_g" id="concern_it" value="concern_it">
            <label for="concern_sport">스포츠</label>
            <input type="checkbox" name="concern_g" id="concern_sport" value="concern_sport">
            <label for="concern_mu_mo">음악/영화</label>
            <input type="checkbox" name="concern_g" id="concern_mu_mo" value="concern_mu_mo">
            <span>주문 색상</span>
            <select name="color_select" id="color_select">
                <!-- option 내부 다른 태그 금지 -->
                <option value="none">색상을 선택하세요.</option>
                <option value="white">white</option>
                <option value="gray">gray</option>
                <option value="black">black</option>
            </select>
            <span>주문크기</span>
            <select name="size_ch" id="size_ch">
                <option value="none">사이즈를 선택하세요.</option>
                <option value="L">L</option>
                <option value="M">M</option>
                <option value="S">S</option>
            </select>

        </div>
    </form>
</body>
</html>
