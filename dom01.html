<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>자바스크립트 DOM(Document Object Model)</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/dom01.css">
    <script src="./scripts/dom01.js" defer></script>
    <!-- script의 defer속성 : body태그를 모두 읽고 script 나중에 처리하라는 속성 -->
</head>
<body>
    <div id="wrap">
        <header>
            <div class="top">
                <h1><a href="#">ToDo</a></h1>
                <div class="right">
                    <a href="#" class="search"><img src="" alt="검색"></a>
                    <a href="#" class="menu"><img src="" alt="메뉴"></a>
                </div>
            </div>
            <nav>
                <a href="#" class="active all">All(3)</a>
                <a href="#" class="today">Toady(0)</a>
            </nav>
        </header>
        <main>
            <ul class="todo_list">
                <li><span class="date">05.12</span><em class="list">책15분 읽기</em></li>
                <li><span class="date">07.07</span><em class="list">과제하기</em></li>
                <li><span class="date">07.07</span><em class="list">복습하기</em></li>
                <li><span class="date">07.08</span><em class="list">공부하기</em></li>
            </ul>
            <button id="write_btn" onclick="popupShow()"><img src="#" alt="글쓰기창띄우기"></button>
            <div class="write_popup">
                <input type="text" class="user_write" placeholder="add a new task"> <!-- type : 한줄일 때 사용, 2줄 이상부터는 다른 태그 사용 -->
                <button class="write_btn2"><img src="#" alt="글등록하기"></button>
            </div>
            <div class="popup_bg" onclick="popupClose()"></div>
        </main>
    </div>
</body>
</html>
